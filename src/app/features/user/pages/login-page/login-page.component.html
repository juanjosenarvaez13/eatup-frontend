<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="brand-logo">
        <span class="brand-icon">🍽</span>
        <h1 class="brand-name">EatUp</h1>
      </div>
      <p class="subtitle">Ingresa a tu cuenta para continuar</p>
    </div>

    @if (errorMsg) {
      <div class="alert-error">
        <span class="alert-icon">⚠</span>
        {{ errorMsg }}
      </div>
    }

    <form class="login-form" (ngSubmit)="submit()" #loginForm="ngForm">
      <div class="field">
        <label for="email">Correo electronico</label>
        <input
          id="email"
          name="email"
          type="email"
          [(ngModel)]="email"
          placeholder="tucorreo@ejemplo.com"
          autocomplete="username"
          required
          #emailModel="ngModel"
        />
      </div>

      <div class="field">
        <label for="password">Contrasena</label>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
          #passwordModel="ngModel"
        />
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading || loginForm.invalid">
        @if (isLoading) {
          <span class="spinner-sm"></span>
          Iniciando sesion...
        } @else {
          Iniciar sesion
        }
      </button>

      <a class="btn-register" [routerLink]="['/login/register']">
        Registrar usuario nuevo
      </a>
    </form>
  </div>
</div>
